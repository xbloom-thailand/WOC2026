<style>
:root {
  --bg: #ffffff;
  --canvas: #f5f5f5;
  --ink: #0a0a0a;
  --ink-soft: #4a4a4a;
  --ink-mute: #8a8a8a;
  --line: #e5e5e5;
  --line-soft: #f0f0f0;
  --cream: #f7f7f7;
  --accent-green: #2f7a3e;
  --accent-green-bg: #e8f3eb;
  --accent-orange: #b85c1a;
  --accent-orange-bg: #fbeadd;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow-card: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.04);
  --shadow-sheet: 0 -8px 40px rgba(0,0,0,.12);
  --shadow-app: 0 0 0 1px rgba(0,0,0,.04), 0 2px 8px rgba(0,0,0,.03), 0 20px 60px rgba(0,0,0,.06);
  --display: 'Quincy CF', 'Quincy CF Regular', 'Playfair Display', Georgia, serif;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --tap: 44px; /* min touch target iOS HIG */
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html {
  /* ป้องกัน overscroll bounce เห็นพื้นสีไม่ตรง */
  background: var(--canvas);
  /* ป้องกัน font resize เมื่อหมุนหน้าจอ iOS */
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

html, body {
  font-family: var(--sans);
  background: var(--canvas);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  /* รองรับ dynamic viewport (iOS Safari) */
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* iOS input focus ไม่ zoom ต้องเป็น 16px+ */
input, textarea, select {
  font-family: inherit;
  color: inherit;
  font-size: 16px;
  -webkit-appearance: none;
  appearance: none;
  border-radius: 0;
}

img { max-width: 100%; display: block; }
button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  /* iOS buttons default ขอบเหลี่ยม */
  -webkit-appearance: none;
  appearance: none;
  /* Touch target minimum */
  touch-action: manipulation;
}

/* ===== LAYOUT ===== */
.app {
  width: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--bg);
  position: relative;
}
/* Tablet+ : app เป็น card ลอยบน canvas เทา */
@media (min-width: 600px) {
  .app {
    max-width: 480px;
    margin: 0 auto;
    box-shadow: var(--shadow-app);
  }
}

/* ===== HEADER ===== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  padding-top: calc(14px + var(--safe-top));
  padding-left: calc(20px + var(--safe-left));
  padding-right: calc(20px + var(--safe-right));
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 50;
}
.logo {
  font-family: var(--display);
  font-weight: 700;
  font-size: 24px;
  letter-spacing: -.035em;
  line-height: 1;
  color: var(--ink);
}
.header-meta {
  font-size: 10px;
  letter-spacing: .08em;
  color: var(--ink-soft);
  font-weight: 500;
  text-transform: uppercase;
}

/* ===== HERO ===== */
.hero {
  padding: 36px 20px 24px;
  text-align: center;
}
.hero-tag {
  display: inline-block;
  background: var(--ink);
  color: #fff;
  font-size: 10.5px;
  letter-spacing: .14em;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 999px;
  text-transform: uppercase;
  margin-bottom: 24px;
}
.hero h1 {
  font-family: var(--display);
  font-weight: 700;
  font-size: 52px;
  line-height: .92;
  letter-spacing: -.035em;
  color: var(--ink);
}
.hero h1 em {
  display: block;
  font-style: italic;
  font-weight: 400;
  color: #a8a6a3;
  margin-top: 2px;
  font-size: 50px;
  letter-spacing: -.02em;
  line-height: 1;
}
.hero-sub {
  color: var(--ink-soft);
  font-size: 14px;
  margin-top: 18px;
  line-height: 1.55;
}
.hero-pills {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 22px;
  flex-wrap: wrap;
}
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #ededed;
  border: 1px solid transparent;
  border-radius: 999px;
  padding: 9px 16px;
  font-size: 12.5px;
  color: var(--ink);
  font-weight: 500;
  white-space: nowrap;
}

/* Larger iPhones (Pro Max, Plus) */
@media (min-width: 414px) {
  .hero { padding: 42px 24px 28px; }
  .hero h1 { font-size: 58px; }
  .hero h1 em { font-size: 56px; }
}

/* ===== DAY TABS ===== */
.day-tabs {
  display: flex;
  gap: 4px;
  margin: 24px 16px 0;
  background: var(--line-soft);
  padding: 5px;
  border-radius: 999px;
  position: sticky;
  top: calc(52px + var(--safe-top));
  z-index: 20;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.day-tab {
  flex: 1;
  padding: 8px 0;
  min-height: 40px;
  border-radius: 999px;
  font-size: 10.5px;
  color: var(--ink-mute);
  text-align: center;
  transition: all .25s ease;
  font-weight: 500;
  letter-spacing: .02em;
  text-transform: uppercase;
}
.day-tab strong {
  display: block;
  font-family: var(--display);
  font-size: 17px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 2px;
  color: var(--ink-mute);
  letter-spacing: -.02em;
}
.day-tab.active {
  background: var(--bg);
  color: var(--ink);
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.day-tab.active strong { color: var(--ink); }
.day-tab:active {
  transform: scale(.96);
}

/* ===== CLASSES LIST ===== */
.classes {
  padding: 20px 16px calc(100px + var(--safe-bottom));
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.class-card {
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 20px;
  overflow: hidden;
  background: var(--bg);
  box-shadow: 0 6px 20px rgba(0,0,0,0.03);
  transition: transform .2s ease, box-shadow .3s ease;
}
.class-card.has-class:active {
  transform: scale(.99);
}
@media (hover: hover) {
  .class-card.has-class:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.05);
  }
}

.class-image {
  width: 100%;
  aspect-ratio: 2.2/1;
  background: var(--cream);
  background-size: cover;
  background-position: center;
  border-bottom: 1px solid rgba(0,0,0,0.04);
}

.class-meta-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  gap: 8px;
}
.class-time {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  white-space: nowrap;
  letter-spacing: .01em;
}
.availability {
  font-size: 10px;
  letter-spacing: .04em;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 100px;
  text-transform: uppercase;
  white-space: nowrap;
}
.availability.open {
  background: rgba(52, 199, 89, 0.12);
  color: #2f7a3e;
}
.availability.low {
  background: rgba(255, 149, 0, 0.12);
  color: #b85c1a;
}
.availability.full {
  background: rgba(255, 59, 48, 0.12);
  color: #993b3b;
}

.class-body {
  padding: 16px 20px 20px;
}

.class-partner-label {
  font-size: 10px;
  color: var(--ink-mute);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 600;
  line-height: 1.3;
}
.class-title {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.01em;
  line-height: 1.2;
  margin-bottom: 8px;
  color: var(--ink);
}
.class-desc {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.45;
  margin-bottom: 20px;
}

.class-footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 10px;
}
.class-footer > div:first-child {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.instructor-label {
  font-size: 10px;
  color: var(--ink-mute);
  text-transform: uppercase;
  letter-spacing: .06em;
  font-weight: 600;
}
.instructor-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.btn-primary {
  background: var(--ink);
  color: #fff;
  padding: 10px 20px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -.01em;
  min-height: 40px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
  transition: transform .2s ease, opacity .2s ease;
}
.btn-primary:active { transform: scale(.95); opacity: .85; }
.btn-primary:disabled {
  background: var(--cream);
  color: var(--ink-mute);
  cursor: not-allowed;
  transform: none;
  opacity: 1;
}

/* Coming Soon card */
.class-card.coming-soon {
  padding: 0;
  background: var(--bg);
}
.class-card.coming-soon .class-meta-row {
  padding: 16px 20px 12px;
}
.class-card.coming-soon .coming-soon-body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
  text-align: center;
  gap: 8px;
}
.coming-soon-text {
  font-size: 13px;
  color: var(--ink-mute);
  font-weight: 500;
}

/* Larger iPhones */
@media (min-width: 414px) {
  .classes { padding: 22px 20px calc(110px + var(--safe-bottom)); gap: 18px; }
  .class-title { font-size: 24px; }
}

/* ===== BOTTOM BAR ===== */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 12px 16px;
  padding-bottom: calc(12px + var(--safe-bottom));
  padding-left: calc(16px + var(--safe-left));
  padding-right: calc(16px + var(--safe-right));
  background: rgba(255,255,255,.96);
  backdrop-filter: blur(14px) saturate(180%);
  -webkit-backdrop-filter: blur(14px) saturate(180%);
  border-top: 1px solid var(--line);
  z-index: 40;
}
@media (min-width: 600px) {
  .bottom-bar {
    left: 50%;
    right: auto;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
  }
}
.bottom-bar button {
  padding: 12px;
  min-height: var(--tap);
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
  font-size: 13px;
  font-weight: 600;
  background: var(--bg);
  color: var(--ink);
  transition: background .15s ease, transform .15s ease;
}
.bottom-bar button:active {
  background: var(--line-soft);
  transform: scale(.98);
}

/* ===== MODAL / SHEET ===== */
.sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s ease;
}
.sheet-overlay.open { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  transform: translateY(100%);
  max-height: 92vh;
  max-height: 92dvh;
  background: var(--bg);
  border-radius: 22px 22px 0 0;
  z-index: 101;
  transition: transform .35s cubic-bezier(.32,.72,0,1);
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  box-shadow: var(--shadow-sheet);
  padding-bottom: var(--safe-bottom);
}
.sheet.open { transform: translateY(0); }

@media (min-width: 600px) {
  .sheet {
    left: 50%;
    right: auto;
    width: 100%;
    max-width: 480px;
    transform: translate(-50%, 100%);
  }
  .sheet.open { transform: translate(-50%, 0); }
}

.sheet-handle {
  width: 40px;
  height: 4px;
  background: var(--line);
  border-radius: 2px;
  margin: 10px auto 0;
}

.sheet-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px 10px;
  padding-left: calc(20px + var(--safe-left));
  padding-right: calc(20px + var(--safe-right));
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 2;
}
.sheet-title {
  font-size: 17px;
  font-weight: 700;
}
.sheet-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--line-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--ink-soft);
  transition: background .15s, transform .15s;
}
.sheet-close:active { background: var(--line); transform: scale(.92); }

.sheet-body {
  padding: 0 20px 24px;
  padding-left: calc(20px + var(--safe-left));
  padding-right: calc(20px + var(--safe-right));
}

.detail-title {
  font-family: var(--display);
  font-size: 28px;
  font-weight: 700;
  line-height: 1.12;
  letter-spacing: -.025em;
}
.detail-by {
  font-size: 13px;
  color: var(--ink-soft);
  margin-top: 4px;
  margin-bottom: 16px;
  line-height: 1.4;
}

.detail-time-box {
  background: var(--cream);
  border-radius: var(--radius-sm);
  padding: 13px 14px;
  font-size: 13.5px;
  font-weight: 600;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.detail-section { margin-bottom: 18px; }
.detail-section h4 {
  font-size: 10px;
  letter-spacing: .15em;
  color: var(--ink-mute);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 8px;
}
.detail-section p,
.detail-section ul {
  font-size: 13.5px;
  color: var(--ink);
  line-height: 1.55;
}
.detail-section ul {
  list-style: none;
}
.detail-section ul li {
  padding: 3px 0 3px 16px;
  position: relative;
}
.detail-section ul li::before {
  content: '•';
  position: absolute;
  left: 4px;
  color: var(--ink-mute);
}

.perk-box {
  background: var(--cream);
  border-radius: var(--radius-sm);
  padding: 14px;
  font-size: 13.5px;
  line-height: 1.5;
  border: 1px solid var(--line-soft);
}
.perk-box span.icon { margin-right: 6px; }
.perk-item {
  padding: 3px 0;
  display: flex;
  align-items: flex-start;
  gap: 4px;
}
.perk-item:not(:last-child) {
  border-bottom: 1px solid var(--line-soft);
  padding-bottom: 8px;
  margin-bottom: 4px;
}

hr.divider {
  border: none;
  border-top: 1px solid var(--line);
  margin: 22px 0;
}

.booking-label {
  font-size: 10px;
  letter-spacing: .15em;
  color: var(--ink-mute);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 12px;
}

/* ===== FORM ===== */
.form-section-label {
  font-size: 10px;
  letter-spacing: .15em;
  color: var(--ink-mute);
  text-transform: uppercase;
  font-weight: 700;
  margin: 20px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--line-soft);
}
.form-section-label:first-child { margin-top: 0; }

.agenda-row {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 8px;
}
.agenda-row .field {
  margin-bottom: 10px;
}

.field {
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  margin-bottom: 10px;
  transition: border-color .15s ease;
  background: var(--bg);
}
.field:focus-within { border-color: var(--ink); }
.field label {
  font-size: 11px;
  color: var(--ink-mute);
  font-weight: 500;
  display: block;
  margin-bottom: 2px;
}
.field input,
.field textarea {
  width: 100%;
  border: none;
  outline: none;
  font-size: 16px; /* iOS: ต้อง >= 16px ป้องกัน zoom */
  background: transparent;
  padding: 0;
  line-height: 1.4;
}
.field textarea { resize: vertical; min-height: 64px; }

.btn-cta {
  width: 100%;
  background: var(--ink);
  color: #fff;
  padding: 15px;
  min-height: 52px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  margin-top: 12px;
  transition: background .15s, transform .15s;
}
.btn-cta:active { background: #252525; transform: scale(.98); }
.btn-cta:disabled { background: #999; cursor: not-allowed; }

.error-msg {
  color: #b03232;
  font-size: 12.5px;
  margin-top: 8px;
  padding: 10px 12px;
  background: #fbecec;
  border-radius: var(--radius-sm);
  display: none;
  line-height: 1.4;
}
.error-msg.show { display: block; }

/* ===== CONFIRMATION ===== */
.confirm-state {
  text-align: center;
  padding: 20px 10px;
}
.confirm-check {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent-green-bg);
  color: var(--accent-green);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  font-size: 28px;
}
.confirm-title {
  font-family: var(--display);
  font-size: 30px;
  font-weight: 700;
  margin-bottom: 6px;
  letter-spacing: -.03em;
  line-height: 1;
}
.confirm-sub {
  color: var(--ink-soft);
  font-size: 13.5px;
  margin-bottom: 22px;
}
.qr-box {
  background: var(--cream);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 18px;
}
#qrcode { display: flex; justify-content: center; }
#qrcode canvas { max-width: 180px; height: auto !important; }
.booking-code {
  font-family: 'Courier New', monospace;
  font-size: 18px;
  letter-spacing: .08em;

}

<body>

<div id="customerApp" class="app">
  <!-- HEADER -->

    </p>

</div>

<!-- ===== BOOKING LOOKUP SHEET ===== -->
<div class="sheet-overlay" id="lookupOverlay" onclick="closeSheet('lookup')"></div>
<div class="sheet" id="lookupSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">My Booking</div>
    <button class="sheet-close" onclick="closeSheet('lookup')">✕</button>
  </div>
  <div class="sheet-body">
    <div id="lookupInput">
      <p style="color:var(--ink-soft); font-size:13.5px; margin-bottom:16px;">กรอก Booking Code เพื่อดูรายละเอียดการจอง</p>
      <div class="field">
        <label>Booking Code</label>
        <input id="lookupCode" placeholder="XB-XXXXXX" style="text-transform:uppercase" />
      </div>
      <button class="btn-cta" onclick="doLookup()">ค้นหา</button>
      <div id="lookupError" class="error-msg"></div>

<!-- ===== PARTNER SHEET ===== -->
<div class="sheet-overlay" id="partnerOverlay" onclick="closeSheet('partner')"></div>

  <div class="sheet-header">
    <div class="sheet-title">Partner Portal</div>
    <button class="sheet-close" onclick="closeSheet('partner')">✕</button>
  </div>
  <div class="sheet-body" id="partnerBody"></div>
</div>

<script>
// ==========================================================
// CONFIG — แก้ URL ตรงนี้หลัง deploy GAS
// ==========================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbxFlccYE0EP2Ocro-IU8n7NvxPPdTgFp_-AKq5VqVFp2qRMKaMHwyU1ZrV06jrT_eQR/exec';

const DAYS = [
  { date: '2026-05-07', label: 'May', num: '7' },
  { date: '2026-05-08', label: 'May', num: '8' },
  { date: '2026-05-09', label: 'May', num: '9' }
];
const SLOTS = ['10:00-11:30','11:30-13:00','13:00-14:30','14:30-16:00','16:00-17:30'];

let allClasses = [];
let selectedDay = DAYS[0].date;
let partnerPassword = null;

// ==========================================================
// API
// ==========================================================
async function apiGet(params = {}) {
  const url = new URL(API_URL);
  Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
  const r = await fetch(url.toString());
  return r.json();
}
async function apiPost(data) {
  const r = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify(data),
    headers: { 'Content-Type': 'text/plain;charset=utf-8' } // หลีกเลี่ยง preflight CORS
  });
  return r.json();
}

// ==========================================================
// INIT
// ==========================================================
async function init() {
  renderDayTabs();
  await loadClasses();
}

function renderDayTabs() {
  const el = document.getElementById('dayTabs');
  el.innerHTML = DAYS.map(d => `
    <button class="day-tab ${d.date === selectedDay ? 'active' : ''}"
            onclick="switchDay('${d.date}')">
      <strong>${d.num}</strong>${d.label}
    </button>
  `).join('');
}

async function loadClasses() {
  try {
    const data = await apiGet({ action: 'getClasses' });
    allClasses = data.classes || [];
    renderClasses();
  } catch (err) {
    document.getElementById('classList').innerHTML =
      `<div class="loading">โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่<br><small style="opacity:.6">${err.message || err}</small></div>`;
  }
}

function switchDay(date) {
  selectedDay = date;
  renderDayTabs();
  renderClasses();
}

function renderClasses() {
  const list = document.getElementById('classList');
  const dayClasses = allClasses
    .filter(c => c.date === selectedDay)
    .sort((a,b) => a.slot.localeCompare(b.slot));

  if (dayClasses.length === 0) {
    list.innerHTML = '<div class="loading">ยังไม่มีข้อมูล class</div>';
    return;
  }

  list.innerHTML = dayClasses.map(c => renderClassCard(c)).join('');
}

function renderClassCard(c) {
  const hasClass = c.status === 'open' && c.title;

  let availClass = 'open', availText = `${c.available} Available`;
  if (c.available === 0) { availClass = 'full'; availText = 'Fully Booked'; }
  else if (c.available <= 3) { availClass = 'low'; availText = `Only ${c.available} Left`; }

  if (!hasClass) {
    return `
      <div class="class-card coming-soon">
        <div class="class-meta-row">
          <span class="class-time">${c.slot.replace('-', ' – ')}</span>
        </div>
        <div class="coming-soon-body">
          <div class="coming-soon-text">Coming Soon — Stay Tuned</div>
        </div>
      </div>
    `;
  }

  const img = c.image_url
    ? `<div class="class-image" style="background-image:url('${escapeAttr(c.image_url)}')"></div>`
    : '';

  return `
    <div class="class-card has-class">
      ${img}
      <div class="class-meta-row">
        <span class="class-time">${c.slot.replace('-', ' – ')}</span>
        <span class="availability ${availClass}">${availText}</span>
      </div>
      <div class="class-body">
        ${c.partner ? `<div class="class-partner-label">In partnership with ${escapeHtml(c.partner)}</div>` : ''}
        <div class="class-title">${escapeHtml(c.title)}</div>
        ${c.description ? `<div class="class-desc">${escapeHtml(c.description)}</div>` : ''}
        <div class="class-footer">
          <div>
            ${c.instructor ? `<div class="instructor-label">Instructor</div><div class="instructor-name">${escapeHtml(c.instructor)}</div>` : ''}
          </div>
          <button class="btn-primary" onclick="openClassDetail('${c.class_id}')"
            ${c.available === 0 ? 'disabled' : ''}>
            ${c.available === 0 ? 'Fully Booked' : 'Details & Book'}
          </button>
        </div>
      </div>
    </div>
  `;
}

// ==========================================================
// CLASS DETAIL + BOOKING
// ==========================================================
function openClassDetail(classId) {
  const c = allClasses.find(x => x.class_id === classId);
  if (!c) return;

  // สร้าง agenda items จาก fields
  const agendaItems = [
    { time: c.agenda_1_time, title: c.agenda_1_title },
    { time: c.agenda_2_time, title: c.agenda_2_title },
    { time: c.agenda_3_time, title: c.agenda_3_title }
  ].filter(a => a.title);

  // Perks: split by newline
  const perkItems = (c.perks || '').split('\n').map(s => s.trim()).filter(Boolean);

  const body = document.getElementById('classDetailBody');
  body.innerHTML = `
    <div class="detail-title">${escapeHtml(c.title)}</div>
    <div class="detail-by">
      ${c.partner ? `By ${escapeHtml(c.partner)}` : ''}
      ${c.instructor ? ` · Led by ${escapeHtml(c.instructor)}` : ''}
    </div>

    <div class="detail-time-box">
      📅 ${formatDate(c.date)} · ${c.slot.replace('-', ' – ')}
    </div>

    ${c.description ? `
      <div class="detail-section">
        <h4>About the Class</h4>
        <p>${escapeHtml(c.description)}</p>
      </div>
    ` : ''}

    ${c.who_is_for ? `
      <div class="detail-section">
        <h4>Who is this for?</h4>
        <p>${escapeHtml(c.who_is_for)}</p>
      </div>
    ` : ''}

    ${agendaItems.length ? `
      <div class="detail-section">
        <h4>90-minute Agenda</h4>
        <ul>
          ${agendaItems.map(a => `<li>${a.time ? `<strong>${escapeHtml(a.time)}:</strong> ` : ''}${escapeHtml(a.title)}</li>`).join('')}
        </ul>
      </div>
    ` : ''}

    ${perkItems.length ? `
      <div class="detail-section">
        <h4>What You'll Get</h4>
        <div class="perk-box">
          ${perkItems.map(p => `<div class="perk-item"><span class="icon">☕</span>${escapeHtml(p)}</div>`).join('')}
        </div>
      </div>
    ` : ''}

    <hr class="divider" />

    <div class="booking-label">Reserve Your Seat · ${c.available} เหลือ</div>
    <div class="field"><label>ชื่อ-นามสกุล *</label><input id="bName" placeholder="กรอกชื่อ-นามสกุล" /></div>
    <div class="field"><label>โทรศัพท์ *</label><input id="bPhone" placeholder="08X-XXX-XXXX" /></div>
    <div class="field"><label>อีเมล *</label><input id="bEmail" type="email" placeholder="your@email.com" /></div>
    <div id="bookError" class="error-msg"></div>
    <button class="btn-cta" id="bookBtn" onclick="submitBooking('${c.class_id}')">ยืนยันการจอง</button>
  `;

  openSheet('class');
}

async function submitBooking(classId) {
  const name = document.getElementById('bName').value.trim();
  const phone = document.getElementById('bPhone').value.trim();
  const email = document.getElementById('bEmail').value.trim();
  const errEl = document.getElementById('bookError');
  const btn = document.getElementById('bookBtn');

  errEl.classList.remove('show');

  if (!name || !phone || !email) {
    errEl.textContent = 'กรุณากรอกข้อมูลให้ครบทุกช่อง';
    errEl.classList.add('show');
    return;
  }
  if (!/^\S+@\S+\.\S+$/.test(email)) {
    errEl.textContent = 'รูปแบบอีเมลไม่ถูกต้อง';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'กำลังจอง...';

  try {
    const res = await apiPost({
      action: 'book', class_id: classId, name, phone, email
    });

    if (res.error) {
      errEl.textContent = res.error;
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'ยืนยันการจอง';
      return;
    }

    showConfirmation(res);
    await loadClasses();
  } catch (err) {
    errEl.textContent = 'จองไม่สำเร็จ กรุณาลองใหม่';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'ยืนยันการจอง';
  }
}

function showConfirmation(res) {
  const body = document.getElementById('classDetailBody');
  body.innerHTML = `
    <div class="confirm-state">
      <div class="confirm-check">✓</div>
      <div class="confirm-title">การจองสำเร็จ</div>
      <div class="confirm-sub">โปรดบันทึกหน้านี้หรือ screenshot เพื่อ check-in ที่บูท</div>

      <div class="qr-box">
        <div id="qrcode"></div>
        <div class="code-label">Booking Code</div>
        <div class="booking-code">${res.booking_code}</div>
      </div>

      <div class="confirm-details">
        <div><div class="k">Class</div>${escapeHtml(res.class.title)}</div>
        <div><div class="k">Date & Time</div>${formatDate(res.class.date)} · ${res.class.slot.replace('-', ' – ')}</div>
        ${res.class.instructor ? `<div><div class="k">Instructor</div>${escapeHtml(res.class.instructor)}</div>` : ''}
      </div>

      <button class="btn-cta" onclick="closeSheet('class')">เรียบร้อย</button>
    </div>
  `;

  QRCode.toCanvas(document.createElement('canvas'), res.booking_code, { width: 180, margin: 1 }, (err, canvas) => {
    if (!err) document.getElementById('qrcode').appendChild(canvas);
  });
}

// ==========================================================
// BOOKING LOOKUP
// ==========================================================
function openLookup() {
  document.getElementById('lookupInput').classList.remove('hidden');
  document.getElementById('lookupResult').classList.add('hidden');
  document.getElementById('lookupCode').value = '';
  document.getElementById('lookupError').classList.remove('show');
  openSheet('lookup');
}

async function doLookup() {
  const code = document.getElementById('lookupCode').value.trim().toUpperCase();
  const errEl = document.getElementById('lookupError');
  if (!code) {
    errEl.textContent = 'กรุณากรอก Booking Code';
    errEl.classList.add('show');
    return;
  }
  errEl.classList.remove('show');

  try {
    const res = await apiGet({ action: 'getBooking', code });
    if (res.error) {
      errEl.textContent = 'ไม่พบการจองนี้';
      errEl.classList.add('show');
      return;
    }

    document.getElementById('lookupInput').classList.add('hidden');
    const resultEl = document.getElementById('lookupResult');
    resultEl.classList.remove('hidden');
    resultEl.innerHTML = `
      <div class="confirm-state">
        <div class="qr-box">
          <div id="qrcode2"></div>
          <div class="code-label">Booking Code</div>
          <div class="booking-code">${res.booking_code}</div>
        </div>
        <div class="confirm-details">
          <div><div class="k">Name</div>${escapeHtml(res.name)}</div>
          <div><div class="k">Date & Time</div>${formatDate(res.date)} · ${res.slot.replace('-', ' – ')}</div>
          <div><div class="k">Phone</div>${escapeHtml(res.phone)}</div>
          <div><div class="k">Email</div>${escapeHtml(res.email)}</div>
        </div>
        <button class="btn-cta" onclick="closeSheet('lookup')">ปิด</button>
      </div>
    `;
    QRCode.toCanvas(document.createElement('canvas'), res.booking_code, { width: 180, margin: 1 }, (err, canvas) => {
      if (!err) document.getElementById('qrcode2').appendChild(canvas);
    });
  } catch (err) {
    errEl.textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
    errEl.classList.add('show');
  }
}

// ==========================================================
// PARTNER BACKEND
// ==========================================================
function openPartner() {
  renderPartnerGate();
  openSheet('partner');
}

function renderPartnerGate() {
  document.getElementById('partnerBody').innerHTML = `
    <div class="partner-gate">
      <h2>Partner Login</h2>
      <p>เข้าสู่ระบบเพื่อจัดการ class และดู booking</p>
      <div class="field"><label>Password</label>
        <input id="ppwd" type="password" placeholder="••••••••"
               onkeydown="if(event.key==='Enter') doPartnerLogin()" />
      </div>
      <button class="btn-cta" onclick="doPartnerLogin()">เข้าสู่ระบบ</button>
      <div id="pwdError" class="error-msg"></div>
    </div>
  `;
}

async function doPartnerLogin() {
  const pwd = document.getElementById('ppwd').value;
  const errEl = document.getElementById('pwdError');
  if (!pwd) return;

  try {
    const res = await apiPost({ action: 'partnerLogin', password: pwd });
    if (res.error) {
      errEl.textContent = 'Password ไม่ถูกต้อง';
      errEl.classList.add('show');
      return;
    }
    partnerPassword = pwd;
    await loadClasses();
    renderPartnerDashboard();
  } catch (err) {
    errEl.textContent = 'เกิดข้อผิดพลาด';
    errEl.classList.add('show');
  }
}

function renderPartnerDashboard() {
  const body = document.getElementById('partnerBody');
  let html = `
    <div class="partner-dashboard">
      <div class="partner-top">
        <h2>Partner Dashboard</h2>
        <button class="logout-btn" onclick="partnerLogout()">Logout</button>
      </div>
  `;

  for (const day of DAYS) {
    const dayClasses = allClasses.filter(c => c.date === day.date)
      .sort((a,b) => a.slot.localeCompare(b.slot));
    html += `<div class="partner-day-sect">
      <h3>${formatDate(day.date)}</h3>`;
    for (const c of dayClasses) {
      const hasClass = c.title;
      html += `
        <div class="slot-row ${hasClass ? 'has-class' : ''}">
          <div class="slot-info-left">
            <div class="slot-time">${c.slot.replace('-', ' – ')}</div>
            <div class="slot-title">${hasClass ? escapeHtml(c.title) + (c.partner ? ' · ' + escapeHtml(c.partner) : '') : '— empty slot —'}</div>
          </div>
          <div class="slot-actions">
            ${hasClass ? `<button class="btn-bookings" onclick="viewBookings('${c.class_id}')">👥 ${c.booked}/${c.capacity}</button>` : ''}
            <button class="btn-edit" onclick="editClass('${c.class_id}')">${hasClass ? 'Edit' : 'Add'}</button>
          </div>
        </div>
      `;
    }
    html += `</div>`;
  }
  html += `</div>`;
  body.innerHTML = html;
}

function partnerLogout() {
  partnerPassword = null;
  renderPartnerGate();
}

function editClass(classId) {

    <div class="partner-dashboard">
      <div class="partner-top">
        <h2>${c.title ? 'Edit Class' : 'Add Class'}</h2>
        <button class="logout-btn" onclick="renderPartnerDashboard()">← Back</button>
      </div>
      <p style="color:var(--ink-soft); font-size:13px; margin-bottom:16px;">
        ${formatDate(c.date)} · ${c.slot.replace('-', ' – ')}
      </p>

      <div class="form-section-label">Basic Info</div>
      <div class="field"><label>Class Title *</label><input id="eTitle" value="${escapeAttr(c.title || '')}" placeholder="เช่น The Art of Pour Over" /></div>
      <div class="field"><label>Partner / Brand *</label><input id="ePartner" value="${escapeAttr(c.partner || '')}" placeholder="เช่น Roots Coffee Roaster" /></div>
      <div class="field"><label>Instructor</label><input id="eInstructor" value="${escapeAttr(c.instructor || '')}" placeholder="เช่น Mr. Somchai Chankafae" /></div>
      <div class="field"><label>Description (About the Class)</label><textarea id="eDesc" placeholder="อธิบาย class สั้นๆ">${escapeHtml(c.description || '')}</textarea></div>
      <div class="field"><label>Who is this for?</label><textarea id="eWhoFor" placeholder="เช่น Perfect for coffee beginners and home brewers eager to elevate their morning routine.">${escapeHtml(c.who_is_for || '')}</textarea></div>

      <div class="form-section-label">90-minute Agenda</div>

        <div class="field agenda-title"><label>Part 1 Title</label><input id="eA1Title" value="${escapeAttr(c.agenda_1_title || '')}" placeholder="Introduction to extraction theory" /></div>
      </div>
      <div class="agenda-row">
        <div class="field agenda-time"><label>Part 2 Time</label><input id="eA2Time" value="${escapeAttr(c.agenda_2_time || '')}" placeholder="45m" /></div>
        <div class="field agenda-title"><label>Part 2 Title</label><input id="eA2Title" value="${escapeAttr(c.agenda_2_title || '')}" placeholder="Hands-on brewing" /></div>
      </div>
      <div class="agenda-row">
        <div class="field agenda-time"><label>Part 3 Time</label><input id="eA3Time" value="${escapeAttr(c.agenda_3_time || '')}" placeholder="30m" /></div>
        <div class="field agenda-title"><label>Part 3 Title</label><input id="eA3Title" value="${escapeAttr(c.agenda_3_title || '')}" placeholder="Tasting, comparison, and Q&A" /></div>
      </div>

      <div class="form-section-label">What You'll Get</div>
      <div class="field"><label>Perks (บรรทัดละ 1 รายการ)</label><textarea id="ePerks" rows="4" placeholder="An exclusive recipe guide&#10;50g sample of Roots coffee beans&#10;Digital discount coupon">${escapeHtml(c.perks || '')}</textarea></div>

      <div class="form-section-label">Media & Capacity</div>
      <div class="field"><label>Image URL (optional)</label><input id="eImage" value="${escapeAttr(c.image_url || '')}" placeholder="https://..." /></div>
      <div class="field"><label>Capacity (จำนวนที่รับ)</label><input id="eCap" type="number" min="1" value="${c.capacity || 10}" /></div>

      <button class="btn-cta" id="saveBtn" onclick="saveClass('${c.class_id}')">บันทึก</button>
      ${c.title ? `<button class="btn-cta" style="background:#b03232; margin-top:8px" onclick="clearClass('${c.class_id}')">ลบ class นี้</button>` : ''}

async function saveClass(classId) {
  const title = document.getElementById('eTitle').value.trim();
  const partner = document.getElementById('ePartner').value.trim();
  const errEl = document.getElementById('editError');

  if (!title || !partner) {
    errEl.textContent = 'กรุณากรอก Title และ Partner';
    errEl.classList.add('show');
    return;
  }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';

  try {
    const res = await apiPost({
      action: 'updateClass',
      password: partnerPassword,
      class_id: classId,
      title,
      partner,
      instructor: document.getElementById('eInstructor').value.trim(),
      description: document.getElementById('eDesc').value.trim(),
      who_is_for: document.getElementById('eWhoFor').value.trim(),
      agenda_1_time: document.getElementById('eA1Time').value.trim(),
      agenda_1_title: document.getElementById('eA1Title').value.trim(),
      agenda_2_time: document.getElementById('eA2Time').value.trim(),
      agenda_2_title: document.getElementById('eA2Title').value.trim(),
      agenda_3_time: document.getElementById('eA3Time').value.trim(),
      agenda_3_title: document.getElementById('eA3Title').value.trim(),
      perks: document.getElementById('ePerks').value.trim(),
      image_url: document.getElementById('eImage').value.trim(),
      capacity: parseInt(document.getElementById('eCap').value) || 10
    });
    if (res.error) throw new Error(res.error);
    await loadClasses();
    renderPartnerDashboard();
  } catch (err) {
    errEl.textContent = err.message || 'บันทึกไม่สำเร็จ';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'บันทึก';
  }
}

async function clearClass(classId) {
  if (!confirm('ต้องการลบ class นี้ใช่หรือไม่?')) return;
  try {
    await apiPost({
      action: 'updateClass',
      password: partnerPassword,
      class_id: classId,
      title: '', partner: '', instructor: '',
      description: '', who_is_for: '',
      agenda_1_time: '', agenda_1_title: '',
      agenda_2_time: '', agenda_2_title: '',
      agenda_3_time: '', agenda_3_title: '',
      perks: '', image_url: '', capacity: 10
    });
    await loadClasses();
    renderPartnerDashboard();
  } catch (err) {
    alert('ลบไม่สำเร็จ');
  }
}

async function viewBookings(classId) {
  const c = allClasses.find(x => x.class_id === classId);
  document.getElementById('partnerBody').innerHTML = `
    <div class="partner-dashboard">
      <div class="partner-top">
        <h2>Bookings</h2>
        <button class="logout-btn" onclick="renderPartnerDashboard()">← Back</button>
      </div>
      <p style="font-size:14px; margin-bottom:4px;"><strong>${escapeHtml(c.title)}</strong></p>
      <p style="color:var(--ink-soft); font-size:13px; margin-bottom:16px;">
        ${formatDate(c.date)} · ${c.slot.replace('-', ' – ')} · ${c.booked}/${c.capacity} จอง
      </p>
      <div id="bList" class="loading">กำลังโหลด...</div>
    </div>
  `;

  try {
    const res = await apiPost({
      action: 'getBookingsForClass',
      password: partnerPassword,
      class_id: classId
    });
    const list = document.getElementById('bList');
    if (res.error) { list.innerHTML = `<div class="loading">${res.error}</div>`; return; }
    if (!res.bookings.length) { list.innerHTML = `<div class="loading">ยังไม่มีการจอง</div>`; return; }

    list.className = 'bookings-list';
    list.innerHTML = res.bookings.map(b => `
      <div class="booking-row">
        <div style="font-weight:600">${escapeHtml(b.name)}</div>
        <div style="color:var(--ink-soft); font-size:12.5px">${escapeHtml(b.phone)} · ${escapeHtml(b.email)}</div>
        <div class="bcode">${b.booking_code}</div>
      </div>
    `).join('');
  } catch (err) {
    document.getElementById('bList').innerHTML = `<div class="loading">โหลดไม่สำเร็จ</div>`;
  }
}

// ==========================================================
// SHEET / MODAL HELPERS
// ==========================================================
function openSheet(name) {
  document.getElementById(name + 'Overlay').classList.add('open');
  document.getElementById(name + 'Sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSheet(name) {
  document.getElementById(name + 'Overlay').classList.remove('open');
  document.getElementById(name + 'Sheet').classList.remove('open');
  document.body.style.overflow = '';
}

// ==========================================================
// UTILS
// ==========================================================
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escapeAttr(s) { return escapeHtml(s); }
function formatDate(dateStr) {
  if (!dateStr) return '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const d = new Date(dateStr);
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}
